<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Galley</title>

<style>

tion{font-family:var(--mono);position:relative;width:100%;min-height:30px;max-width:none;margin:0;border-radius:0;background:transparent;color:var(--ink);border:0;box-shadow:none;padding:0}.annotation.resolved{opacity:.62}.annotation.resolved .comment-box{padding:7px 12px}.annotation .comment-box{position:relative;padding:10px 12px}.annotation .thread-actions{display:flex;justify-content:flex-start;gap:6px;align-items:center;border-top:1px solid rgba(34,42,45,.75);padding-top:8px;margin-top:12px}.annotation .thread-intent{border:1px solid rgba(224,175,104,.35);background:rgba(224,175,104,.06);color:var(--amber);border-radius:5px;padding:2px 6px;font-size:11px;line-height:15px}.annotation .thread-actions button{border:1px solid var(--line);background:#101415;color:var(--muted);border-radius:5px;padding:2px 6px;font-size:11px;line-height:15px}.annotation .thread-actions button:hover{border-color:#354146;color:var(--ink);background:#151a1c}.annotation .thread-actions .resolve-thread{color:var(--green);border-color:rgba(115,218,145,.28);background:rgba(115,218,145,.06)}.annotation .thread-actions .resolve-thread:hover{border-color:rgba(115,218,145,.55);background:rgba(115,218,145,.11);color:#9af0b2}.annotation .thread-actions .reopen-thread{color:var(--amber);border-color:rgba(224,175,104,.35);background:rgba(224,175,104,.06)}.annotation .thread-actions .reopen-thread:hover{border-color:rgba(224,175,104,.6);background:rgba(224,175,104,.12);color:#f0c783}.annotation .msg{margin:0 0 14px 0;padding-right:0}.annotation .msg:last-child{margin-bottom:0}.annotation .thread-summary{color:var(--muted);font-size:12px;line-height:20px}.annotation .thread-summary b{color:var(--ink);font-weight:700}.annotation.resolved .thread-actions{display:none}.annotation.resolved .reopen-inline{border:1px solid rgba(224,175,104,.35);background:rgba(224,175,104,.06);color:var(--amber);border-radius:5px;padding:2px 6px;margin-left:6px;font-size:11px;line-height:15px}.annotation.resolved .reopen-inline:hover{border-color:rgba(224,175,104,.6);background:rgba(224,175,104,.12);color:#f0c783}.annotation .meta{display:flex;gap:6px;align-items:baseline;color:var(--muted);font-size:11px}.annotation .msg-actions{margin-left:auto;display:flex;gap:4px;opacity:0;transition:opacity .12s}.annotation .msg:hover .msg-actions{opacity:1}.annotation .msg-actions button{border:1px solid var(--line);background:#101415;color:var(--muted);border-radius:5px;padding:1px 7px;font-size:10px;line-height:15px}.annotation .msg-actions button:hover{border-color:#354146;color:var(--ink);background:#151a1c}.annotation .msg-actions .delete-comment:hover{color:#ff8095;border-color:rgba(255,77,109,.5);background:rgba(255,77,109,.1)}.annotation .author{color:var(--ink);font-weight:700}.annotation .author.agent{color:var(--cyan)}.annotation time{color:var(--ghost)}.annotation p{margin:7px 0 0;color:#9fa8ab;line-height:1.45}.annotation .msg.agent p{color:#a7b8c0}.change-actions{position:absolute;top:4px;right:8px;display:flex;gap:4px;align-items:center;margin:0;padding:0;background:transparent;border:0;width:max-content;z-index:4}.change-actions button{border:0;border-radius:4px;padding:3px 8px;font-size:12px;line-height:16px;transition:background .12s ease,color .12s ease}.change-actions .reject{background:rgba(63,63,70,.82);color:#d4d4d8}.change-actions .reject:hover{background:rgba(82,82,91,.92);color:#fafafa}.change-actions .accept{background:rgba(34,197,94,.72);color:#020617}.change-actions .accept:hover{background:rgba(34,197,94,.9);color:#020617}.diff-header-action{border:0;border-radius:4px;padding:3px 8px;font-size:12px;line-height:16px;background:#039b48;color:#05130b;margin-left:4px}.diff-header-action:hover{background:#06b957;color:#020a05}.diff-header-action.secondary{background:#2b2b2d;color:#e5e7eb}.diff-header-action.secondary:hover{background:#3a3a3d;color:#fff}.diff-header-action.undo{background:transparent;color:var(--amber);border:1px solid rgba(224,175,104,.45)}.diff-header-action.undo:hover{background:rgba(224,175,104,.12);border-color:rgba(224,175,104,.75);color:#f0c783}.diff-header-action.done{opacity:.72}.file-header-actions{display:inline-flex;align-items:center;gap:6px;margin-left:10px}.file-header-actions button,.file-header-actions label{border:1px solid var(--line);border-radius:5px;background:#101415;color:var(--muted);padding:3px 7px;font-size:12px;line-height:16px}.file-header-actions button:hover,.file-header-actions label:hover{color:var(--ink);border-color:#354146}.file-header-actions .stage{background:rgba(115,218,145,.08);color:var(--green);border-color:rgba(115,218,145,.38)}.file-header-actions .stage:hover{background:rgba(115,218,145,.14);border-color:rgba(115,218,145,.65);color:#9af0b2}.file-header-actions .unstage{background:transparent;color:var(--amber);border-color:rgba(224,175,104,.45)}.file-header-actions input{width:auto;margin:0 5px 0 0;vertical-align:-1px}.file-action-dock{display:none}.modal-backdrop{position:absolute;inset:0;z-index:20;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center}.modal-backdrop.show{display:flex}.modal{width:420px;border:1px solid var(--line);border-radius:10px;background:#0b0e0f;box-shadow:0 24px 100px rgba(0,0,0,.65);padding:16px}.modal h3{margin:0 0 8px;font-size:14px}.modal p{margin:0;color:var(--muted);font-size:12px;line-height:1.5}.modal-actions{display:flex;justify-content:flex-end;gap:6px;margin-top:14px}.modal-actions .btn{padding:4px 7px;font-size:12px;line-height:16px}.toast{position:absolute;left:50%;bottom:46px;transform:translateX(-50%);border:1px solid #163b2b;background:#071811;color:var(--green);border-radius:999px;padding:7px 12px;font-size:12px;display:none}.toast.show{display:block}@media(max-width:1100px){body{overflow:auto}.app{height:auto;min-height:100%}.main{grid-template-columns:1fr}.resizer{display:none}.tree,.right{border:0;border-bottom:1px solid var(--line)}.action-pop,.composer{position:static;width:auto;margin:12px}}
body.single .tree,body.single .resizer[data-resize="left"]{display:none}body.single .main{grid-template-columns:minmax(0,1fr) 1px var(--right-width,320px)}body.file-mode .tree,body.file-mode .right,body.file-mode .resizer{display:none}body.file-mode .main{grid-template-columns:minmax(0,1fr)}</style></head><body><div class="app" x-data><header class="top"><div><span class="brand">Galley</span></div><div class="toggle"><button :class="{active: $store.g.diffStyle==='split'}" @click="$store.g.setStyle('split')">Split</button><button :class="{active: $store.g.diffStyle==='unified'}" @click="$store.g.setStyle('unified')">Stacked</button></div><div class="actions"><button class="btn" @click="$store.g.reset()">Reset Review</button><button class="btn primary" :disabled="$store.g.awaitingAgent" @click="$store.g.send()" x-text="$store.g.awaitingAgent ? 'Waiting for Agent…' : 'Send to Agent'">Send to Agent</button></div></header><main class="main"><aside class="tree"><div id="files"><template x-for="r in $store.g.treeRows()" :key="r.key"><div class="node" :class="r.cls" @click="$store.g.rowClick(r)"><span x-show="r.kind==='dir'" x-text="r.dirCaret"></span><span x-text="r.name"></span><span class="count" x-show="r.kind==='dir' && r.count" x-text="r.count"></span><span x-show="r.testToggle" x-text="r.testCaret" @click.stop="$store.g.toggleTestDir(r.testKey)"></span><span class="status-pack" x-show="r.badges"><span class="state-icon pending-decisions" x-show="r.badges && r.badges.pending">◇</span><span class="state-icon comments-open" x-show="r.badges && r.badges.comments">⋯</span><span class="state-icon viewed" x-show="r.badges && r.badges.viewed">✓</span></span><button class="git-action" x-show="r.git" :class="r.git" @click.stop="$store.g.gitToggle(r.path, r.git)" x-text="r.gitSymbol"></button></div></template></div></aside><div class="resizer" data-resize="left"></div><section class="center" x-ignore><div id="diff"></div></section><div class="resizer" data-resize="right"></div><aside class="right"></aside><div class="action-pop" id="actionPop" :class="{show: $store.g.popoverOpen}"><div class="pop-context" id="popContext">New line</div><button class="choice" @click="$store.g.openComposer()"><span>c</span><div><b>Comment</b><small>Add note on selection</small></div></button></div><div class="composer" id="composer" :class="{show: $store.g.composerOpen}"><div class="composer-head"><span x-text="$store.g.composerTitle">New line</span></div><textarea id="commentBody" x-model="$store.g.composerBody"></textarea><div class="composer-actions"><button class="btn primary" @click="$store.g.saveComment()">Save</button></div></div><div class="modal-backdrop" id="stageModal" :class="{show: $store.g.modalOpen}"><div class="modal"><h3>Pending decisions</h3><p>Staging will keep all changes and resolve all comments in this file.</p><div class="modal-actions"><button class="btn" @click="$store.g.cancelStage()">Cancel</button><button class="btn primary" @click="$store.g.confirmStage()">Keep all and stage</button></div></div></div><div class="toast" id="toast" :class="{show: $store.g.toastMsg}" x-text="$store.g.toastMsg">saved</div></main></div>
<script type="module" src="/ui.js"></script></body></html>
