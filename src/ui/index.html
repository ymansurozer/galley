<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Galley</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #050606;
      --panel: #101415;
      --panel3: #1d2426;
      --ink: #d9d9d4;
      --muted: #8a9396;
      --ghost: #4b5558;
      --line: #222a2d;
      --cyan: #00a8ff;
      --amber: #e0af68;
      --green: #00d084;
      --red: #ff4d6d;
      --mono: "JetBrains Mono", ui-monospace, monospace;
      font-family: var(--mono)
    }

    * {
      box-sizing: border-box
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: #2a3336 transparent
    }

    *::-webkit-scrollbar {
      width: 8px;
      height: 8px
    }

    *::-webkit-scrollbar-track {
      background: transparent
    }

    *::-webkit-scrollbar-thumb {
      background: #2a3336;
      border: 2px solid transparent;
      border-radius: 999px;
      background-clip: content-box
    }

    *::-webkit-scrollbar-thumb:hover {
      background: #3a464a;
      background-clip: content-box
    }

    *::-webkit-scrollbar-corner {
      background: transparent
    }

    html,
    body {
      height: 100%
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      overflow: hidden
    }

    button,
    input,
    textarea {
      font: inherit
    }

    button {
      color: inherit;
      cursor: pointer
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-rows: 42px 1fr
    }

    .top,
    .bottom {
      display: grid;
      align-items: center;
      padding: 0 12px;
      background: rgba(12, 15, 16, .96);
      border-color: var(--line);
      color: var(--muted);
      font-size: 12px
    }

    .top {
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      border-bottom: 1px solid var(--line)
    }

    .bottom {
      grid-template-columns: 1fr auto;
      gap: 12px;
      border-top: 1px solid var(--line)
    }

    .brand {
      color: var(--ink);
      font-weight: 700
    }

    .actions {
      justify-self: end;
      display: flex;
      gap: 8px;
      align-items: center
    }

    .toggle {
      display: flex;
      gap: 3px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #070909;
      margin: 0
    }

    .toggle button,
    .btn {
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      border-radius: 6px;
      padding: 5px 8px
    }

    .toggle button.active {
      background: var(--panel3);
      color: var(--ink)
    }

    .btn {
      border-color: var(--line);
      background: var(--panel);
      color: var(--ink)
    }

    .btn:hover {
      border-color: #354146;
      background: #151a1c
    }

    .btn.primary {
      color: var(--cyan);
      border-color: #17394a;
      background: #081923
    }

    .btn.primary:hover {
      background: #0c2533;
      border-color: #25617a
    }

    .btn.green {
      color: var(--green);
      border-color: #163b2b;
      background: #071811
    }

    .main {
      min-height: 0;
      display: grid;
      grid-template-columns: var(--left-width, 280px) 1px minmax(0, 1fr);
      position: relative
    }

    .tree,
    .right {
      min-width: 0;
      overflow: auto;
      background: var(--panel);
      padding: 10px
    }

    .tree {
      border-right: 1px solid var(--line);
      padding-top: 20px
    }

    .right {
      border-left: 1px solid var(--line)
    }

    .resizer {
      background: var(--line);
      cursor: col-resize;
      min-width: 1px;
      position: relative
    }

    .resizer:before {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: -4px;
      right: -4px
    }

    .resizer:hover,
    .resizer.dragging {
      background: var(--cyan)
    }

    .center {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .bar {
      display: none
    }

    [x-cloak] {
      display: none !important
    }

    .guidebar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      min-height: 38px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      font-size: 12px
    }

    .guidebar .gb-acts {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 4px
    }

    .guidebar .gb-home,
    .guidebar .gb-nav {
      flex: 0 0 auto;
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--muted);
      font-size: 14px
    }

    .guidebar .gb-home:hover,
    .guidebar .gb-nav:not(:disabled):hover {
      border-color: #354146;
      color: var(--ink);
      background: #151a1c
    }

    .guidebar .gb-nav:disabled {
      opacity: .4;
      cursor: default
    }

    .guidebar .gb-progress {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 11px
    }

    .guidebar .gb-bar {
      width: 60px;
      height: 3px;
      border-radius: 3px;
      overflow: hidden;
      background: var(--line)
    }

    .guidebar .gb-bar>i {
      display: block;
      height: 100%;
      background: var(--green);
      transition: width .25s
    }

    .guidebar .gb-fill {
      flex: 1 1 auto
    }

    .guidebar .gb-stale {
      flex: 0 0 auto;
      color: var(--amber);
      font-size: 11px
    }

    .guide-overview .go-stale {
      margin: 12px 0 18px;
      padding: 8px 11px;
      border: 1px solid rgba(224, 175, 104, .5);
      border-left: 2px solid var(--amber);
      border-radius: 6px;
      background: rgba(224, 175, 104, .05);
      color: var(--amber);
      font-size: 12px;
      line-height: 1.45
    }

    .guide-overview .go-stale code {
      background: #0b0e0f;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 0 4px
    }

    /* Guided custom diff header (renderCustomHeader): row 1 = icon + file + counts + actions
       (preserves @pierre's look); row 2 = category + guidance, left-aligned. */
    .ghdr {
      display: flex;
      flex-direction: column;
      gap: 5px;
      width: 100%;
      padding: 8px 16px;
      box-sizing: border-box;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      font-family: var(--mono);
      font-size: 12px
    }

    .ghdr .ghdr-row1 {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .ghdr .ghdr-guide {
      align-self: flex-start;
      display: flex;
      flex-direction: column;
      gap: 5px;
      /* center the 2px rule under the 15px change-type icon above (icon center − border) */
      margin-left: 6.5px;
      padding: 1px 0 1px 12px;
      border-left: 2px solid var(--ct-color, var(--line))
    }

    .ghdr .ghdr-row2 {
      max-width: 72ch;
      line-height: 1.45
    }

    .ghdr .ghdr-grow {
      flex: 1 1 auto
    }

    .ghdr .ghdr-icon {
      flex: 0 0 auto;
      width: 15px;
      height: 15px;
      fill: currentColor;
      color: var(--ct-color, var(--muted))
    }

    .ghdr .ghdr-cat {
      margin-right: 7px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--cyan);
      white-space: nowrap
    }

    .ghdr .ghdr-cat.crit {
      color: var(--amber)
    }

    .ghdr .ghdr-file {
      flex: 0 0 auto;
      color: var(--ink);
      font-weight: 600
    }

    .ghdr .ghdr-expl {
      color: var(--muted)
    }

    .ghdr .ghdr-why {
      max-width: 74ch;
      color: var(--amber);
      font-size: 11.5px;
      line-height: 1.45;
      white-space: normal
    }

    .ghdr .ghdr-counts {
      flex: 0 0 auto;
      display: inline-flex;
      gap: 6px
    }

    .ghdr .ghdr-counts .a {
      color: var(--green)
    }

    .ghdr .ghdr-counts .d {
      color: var(--red)
    }

    .ghdr .ghdr-actions {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 6px
    }

    .guidebar .gb-cat {
      flex: 0 0 auto;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--cyan);
      background: #081923;
      border: 1px solid #17394a;
      border-radius: 999px;
      padding: 2px 8px
    }

    .guidebar .gb-cat.crit {
      color: var(--amber);
      background: rgba(224, 175, 104, .08);
      border-color: rgba(224, 175, 104, .45)
    }

    .guidebar .gb-file {
      flex: 0 0 auto;
      font-weight: 600;
      color: var(--ink)
    }

    .guidebar .gb-expl {
      flex: 1 1 auto;
      min-width: 0;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .guidebar .gb-why {
      flex: 0 1 auto;
      min-width: 0;
      color: var(--amber);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    #diff {
      flex: 1;
      min-height: 0;
      overflow: auto;
      background: #090b0c;
      padding: 0
    }

    #diff>* {
      font-family: var(--mono) !important;
      font-size: var(--code-size, 12.5px);
      line-height: 1.62
    }

    .label {
      color: var(--ghost);
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: 10px;
      margin: 8px 0 7px
    }

    .node {
      display: flex;
      gap: 7px;
      align-items: center;
      padding: 2px 6px;
      border-radius: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.65;
      white-space: nowrap;
      cursor: default;
      user-select: none
    }

    .node[data-file],
    .node[data-dir] {
      cursor: pointer
    }

    .node:hover {
      background: #151a1c;
      color: var(--ink)
    }

    .node.active {
      color: var(--ink);
      background: var(--panel3)
    }

    .node.changed {
      color: var(--cyan)
    }

    .node .status-pack {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      height: 20px
    }

    .node .state-icon {
      color: var(--ghost);
      display: inline-grid;
      place-items: center;
      width: 14px;
      height: 20px;
      line-height: 20px;
      font-size: 13px
    }

    .node .pending-decisions {
      transform: translateY(-1px)
    }

    .node .comments-open {
      transform: translateY(-1px)
    }

    .node .viewed {
      color: var(--green)
    }

    .node .pending-decisions {
      color: var(--cyan)
    }

    .node .comments-open {
      color: var(--amber)
    }

    .git-action {
      margin-left: 4px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--ghost);
      border-radius: 4px;
      width: 20px;
      height: 20px;
      line-height: 18px;
      padding: 0;
      display: inline-grid;
      place-items: center
    }

    .git-action:hover {
      border-color: rgba(115, 218, 145, .45);
      color: var(--green);
      background: rgba(115, 218, 145, .08)
    }

    .git-action.unstage:hover {
      border-color: rgba(224, 175, 104, .55);
      color: var(--amber);
      background: rgba(224, 175, 104, .1)
    }

    .node.test {
      color: var(--ghost)
    }

    .indent-1 {
      padding-left: 18px
    }

    .indent-2 {
      padding-left: 34px
    }

    .indent-3 {
      padding-left: 50px
    }

    .count {
      margin-left: auto;
      color: var(--ghost)
    }

    .card {
      border: 1px solid var(--line);
      background: #0b0e0f;
      border-radius: 8px;
      padding: 9px;
      margin-bottom: 8px;
      font-size: 12px
    }

    .card.active {
      border-color: #17394a;
      background: #081319
    }

    .card p {
      color: var(--muted);
      margin: 6px 0 0;
      line-height: 1.45
    }

    textarea,
    input {
      width: 100%;
      color: var(--ink);
      background: #070909;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 8px
    }

    textarea {
      min-height: 80px;
      resize: vertical
    }

    .action-pop,
    .composer {
      position: absolute;
      right: auto;
      left: 320px;
      top: 150px;
      z-index: 10;
      border: 1px solid #26383d;
      background: rgba(8, 11, 12, .98);
      border-radius: 12px;
      box-shadow: 0 24px 100px rgba(0, 0, 0, .6);
      padding: 8px;
      display: none
    }

    .action-pop {
      width: 270px;
      padding: 7px
    }

    .pop-context {
      color: var(--ghost);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .1em;
      padding: 3px 7px 7px;
      border-bottom: 1px solid rgba(34, 42, 45, .75);
      margin-bottom: 4px
    }

    .composer {
      width: 420px;
      padding: 7px
    }

    .composer-head {
      color: var(--ghost);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .1em;
      padding: 3px 7px 7px;
      margin-bottom: 4px
    }

    .composer textarea {
      min-height: 92px;
      padding: 8px;
      font-size: 12px
    }

    .composer-actions {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 8px
    }

    .composer-actions .btn {
      padding: 4px 8px;
      font-size: 12px;
      line-height: 16px
    }

    .show {
      display: block
    }

    .choice {
      display: grid;
      grid-template-columns: 20px 1fr;
      gap: 6px;
      align-items: center;
      padding: 7px;
      border: 0;
      background: transparent;
      border-radius: 7px;
      color: var(--muted);
      font-size: 12px;
      width: 100%;
      text-align: left
    }

    .choice:hover {
      background: #101a1d
    }

    .choice span:first-child {
      display: grid;
      place-items: center;
      width: 18px;
      height: 18px;
      border: 1px solid #183846;
      border-radius: 5px;
      color: var(--cyan);
      font-size: 11px;
      background: #081319
    }

    .choice b {
      color: var(--ink);
      font-weight: 700
    }

    .choice small {
      display: block;
      margin-top: 1px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.3
    }

    .annotation {
      font-family: var(--mono);
      position: relative;
      width: 100%;
      min-height: 30px;
      max-width: none;
      margin: 0;
      border-radius: 0;
      background: transparent;
      color: var(--ink);
      border: 0;
      box-shadow: none;
      padding: 0
    }

    .annotation.resolved {
      opacity: .62
    }

    .annotation.resolved .comment-box {
      padding: 7px 12px
    }

    .annotation .comment-box {
      position: relative;
      padding: 10px 12px
    }

    .annotation .thread-actions {
      display: flex;
      justify-content: flex-start;
      gap: 6px;
      align-items: center;
      border-top: 1px solid rgba(34, 42, 45, .75);
      padding-top: 8px;
      margin-top: 12px
    }

    .annotation .thread-intent {
      border: 1px solid rgba(224, 175, 104, .35);
      background: rgba(224, 175, 104, .06);
      color: var(--amber);
      border-radius: 5px;
      padding: 2px 6px;
      font-size: 11px;
      line-height: 15px
    }

    .annotation .thread-actions button {
      border: 1px solid var(--line);
      background: #101415;
      color: var(--muted);
      border-radius: 5px;
      padding: 2px 6px;
      font-size: 11px;
      line-height: 15px
    }

    .annotation .thread-actions button:hover {
      border-color: #354146;
      color: var(--ink);
      background: #151a1c
    }

    .annotation .thread-actions .resolve-thread {
      color: var(--green);
      border-color: rgba(115, 218, 145, .28);
      background: rgba(115, 218, 145, .06)
    }

    .annotation .thread-actions .resolve-thread:hover {
      border-color: rgba(115, 218, 145, .55);
      background: rgba(115, 218, 145, .11);
      color: #9af0b2
    }

    .annotation .thread-actions .reopen-thread {
      color: var(--amber);
      border-color: rgba(224, 175, 104, .35);
      background: rgba(224, 175, 104, .06)
    }

    .annotation .thread-actions .reopen-thread:hover {
      border-color: rgba(224, 175, 104, .6);
      background: rgba(224, 175, 104, .12);
      color: #f0c783
    }

    .annotation .msg {
      margin: 0 0 14px 0;
      padding-right: 0
    }

    .annotation .msg:last-child {
      margin-bottom: 0
    }

    .annotation .thread-summary {
      color: var(--muted);
      font-size: 12px;
      line-height: 20px
    }

    .annotation .thread-summary b {
      color: var(--ink);
      font-weight: 700
    }

    .annotation.resolved .thread-actions {
      display: none
    }

    .annotation.resolved .reopen-inline {
      border: 1px solid rgba(224, 175, 104, .35);
      background: rgba(224, 175, 104, .06);
      color: var(--amber);
      border-radius: 5px;
      padding: 2px 6px;
      margin-left: 6px;
      font-size: 11px;
      line-height: 15px
    }

    .annotation.resolved .reopen-inline:hover {
      border-color: rgba(224, 175, 104, .6);
      background: rgba(224, 175, 104, .12);
      color: #f0c783
    }

    .annotation .meta {
      display: flex;
      gap: 6px;
      align-items: baseline;
      color: var(--muted);
      font-size: 11px
    }

    .annotation .msg-actions {
      margin-left: auto;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity .12s
    }

    .annotation .msg:hover .msg-actions {
      opacity: 1
    }

    .annotation .msg-actions button {
      border: 1px solid var(--line);
      background: #101415;
      color: var(--muted);
      border-radius: 5px;
      padding: 1px 7px;
      font-size: 10px;
      line-height: 15px
    }

    .annotation .msg-actions button:hover {
      border-color: #354146;
      color: var(--ink);
      background: #151a1c
    }

    .annotation .msg-actions .delete-comment:hover {
      color: #ff8095;
      border-color: rgba(255, 77, 109, .5);
      background: rgba(255, 77, 109, .1)
    }

    .annotation .intent-badge {
      font-size: 10px;
      border: 0;
      padding: 1px 7px;
      border-radius: 999px;
      line-height: 15px
    }

    .annotation .intent-badge.q {
      color: #8fc4d4;
      background: rgba(0, 168, 255, .12)
    }

    .annotation .intent-badge.a {
      color: #e0b878;
      background: rgba(224, 175, 104, .13)
    }

    .annotation .awaiting-answer {
      margin-top: 6px;
      color: var(--cyan);
      font-size: 11px;
      opacity: .85
    }

    .annotation .awaiting-answer::before {
      content: "◷ "
    }

    .annotation .author {
      color: var(--ink);
      font-weight: 700
    }

    .annotation .author.agent {
      color: var(--cyan)
    }

    .annotation time {
      color: var(--ghost)
    }

    .annotation p {
      margin: 7px 0 0;
      color: #9fa8ab;
      line-height: 1.45
    }

    .annotation .msg.agent p {
      color: #a7b8c0
    }

    .md {
      color: #9fa8ab;
      line-height: 1.5;
      font-size: 12.5px;
      margin-top: 7px
    }

    .annotation .msg.agent .md {
      color: #a7b8c0
    }

    .md>:first-child {
      margin-top: 0
    }

    .md>:last-child {
      margin-bottom: 0
    }

    .md p {
      margin: 6px 0
    }

    .md h1,
    .md h2,
    .md h3,
    .md h4 {
      margin: 10px 0 6px;
      color: var(--ink);
      line-height: 1.3
    }

    .md h1 {
      font-size: 15px
    }

    .md h2 {
      font-size: 14px
    }

    .md h3 {
      font-size: 13px
    }

    .md h4 {
      font-size: 12.5px
    }

    .md ul,
    .md ol {
      margin: 6px 0;
      padding-left: 0;
      list-style-position: inside
    }

    .md li {
      margin: 2px 0
    }

    .md li>ul,
    .md li>ol {
      margin: 2px 0 2px 1.2em
    }

    .md a {
      color: var(--cyan);
      text-decoration: underline
    }

    .md code {
      background: #0b0e0f;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 1px 4px;
      font-size: 11.5px
    }

    .md pre {
      background: #0b0e0f;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      overflow: auto;
      margin: 8px 0
    }

    .md pre.shiki {
      background: #0b0e0f
    }

    .md pre code {
      background: transparent;
      border: 0;
      padding: 0;
      font-size: 11.5px;
      line-height: 1.5
    }

    .md blockquote {
      margin: 6px 0;
      padding-left: 10px;
      border-left: 2px solid var(--line);
      color: var(--muted)
    }

    .md img {
      max-width: 100%
    }

    .md table {
      border-collapse: collapse;
      margin: 6px 0
    }

    .md th,
    .md td {
      border: 1px solid var(--line);
      padding: 3px 7px
    }

    .toggles {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center
    }

    .md-file {
      padding: 14px 18px 24px 30px;
      max-width: 880px
    }

    .md-file.md {
      color: #c4ccce;
      font-size: 13px;
      line-height: 1.62
    }

    .md-anchor {
      cursor: pointer;
      border-radius: 5px;
      transition: background .1s;
      box-decoration-break: clone
    }

    .md-anchor:hover {
      background: rgba(0, 168, 255, .09);
      box-shadow: 0 0 0 4px rgba(0, 168, 255, .09)
    }

    .md-thread {
      margin: 6px 0 14px;
      border-left: 2px solid #25617a;
      border-radius: 0 6px 6px 0;
      background: #0b0e0f;
      cursor: default
    }

    .md-file li>.md-thread {
      margin-left: -6px
    }

    .md input[type=checkbox] {
      width: auto;
      margin: 0 6px 0 0;
      vertical-align: -1px
    }

    .md li.task-list-item,
    .md li:has(>input[type=checkbox]) {
      list-style: none
    }

    .change-actions {
      position: absolute;
      top: 4px;
      right: 8px;
      display: flex;
      gap: 4px;
      align-items: center;
      margin: 0;
      padding: 0;
      background: transparent;
      border: 0;
      width: max-content;
      z-index: 4
    }

    .change-actions button {
      border: 0;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 12px;
      line-height: 16px;
      transition: background .12s ease, color .12s ease
    }

    .change-actions .reject {
      background: rgba(63, 63, 70, .82);
      color: #d4d4d8
    }

    .change-actions .reject:hover {
      background: rgba(82, 82, 91, .92);
      color: #fafafa
    }

    .change-actions .accept {
      background: rgba(34, 197, 94, .72);
      color: #020617
    }

    .change-actions .accept:hover {
      background: rgba(34, 197, 94, .9);
      color: #020617
    }

    .diff-header-action {
      border: 0;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 12px;
      line-height: 16px;
      background: #039b48;
      color: #05130b;
      margin-left: 4px
    }

    .diff-header-action:hover {
      background: #06b957;
      color: #020a05
    }

    .diff-header-action.secondary {
      background: #2b2b2d;
      color: #e5e7eb
    }

    .diff-header-action.secondary:hover {
      background: #3a3a3d;
      color: #fff
    }

    .diff-header-action.undo {
      background: transparent;
      color: var(--amber);
      border: 1px solid rgba(224, 175, 104, .45)
    }

    .diff-header-action.undo:hover {
      background: rgba(224, 175, 104, .12);
      border-color: rgba(224, 175, 104, .75);
      color: #f0c783
    }

    .diff-header-action.done {
      opacity: .72
    }

    .file-header-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: 10px
    }

    .file-header-actions button,
    .file-header-actions label {
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #101415;
      color: var(--muted);
      padding: 3px 7px;
      font-size: 12px;
      line-height: 16px
    }

    .file-header-actions button:hover,
    .file-header-actions label:hover {
      color: var(--ink);
      border-color: #354146
    }

    .file-header-actions .stage {
      background: rgba(115, 218, 145, .08);
      color: var(--green);
      border-color: rgba(115, 218, 145, .38)
    }

    .file-header-actions .stage:hover {
      background: rgba(115, 218, 145, .14);
      border-color: rgba(115, 218, 145, .65);
      color: #9af0b2
    }

    .file-header-actions .unstage {
      background: transparent;
      color: var(--amber);
      border-color: rgba(224, 175, 104, .45)
    }

    .file-header-actions input {
      width: auto;
      margin: 0 5px 0 0;
      vertical-align: -1px
    }

    .file-action-dock {
      display: none
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      z-index: 20;
      background: rgba(0, 0, 0, .45);
      display: none;
      align-items: center;
      justify-content: center
    }

    .modal-backdrop.show {
      display: flex
    }

    .modal {
      width: 420px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0b0e0f;
      box-shadow: 0 24px 100px rgba(0, 0, 0, .65);
      padding: 16px
    }

    .modal h3 {
      margin: 0 0 8px;
      font-size: 14px
    }

    .modal p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 14px
    }

    .modal-actions .btn {
      padding: 4px 7px;
      font-size: 12px;
      line-height: 16px
    }

    .btn.icon {
      padding: 3px 9px;
      font-size: 17px;
      line-height: 20px
    }

    .modal.settings {
      width: 480px;
      max-height: 82vh;
      overflow: auto
    }

    .modal.settings .set-section {
      color: var(--ghost);
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: 10px;
      margin: 24px 0 10px
    }

    .modal.settings .set-section:first-of-type {
      margin-top: 4px
    }

    .set-grid {
      display: grid;
      gap: 9px
    }

    .set-grid label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--muted)
    }

    .set-grid label.check {
      justify-content: flex-start;
      gap: 8px;
      cursor: pointer
    }

    .set-grid select,
    .set-grid input[type=number] {
      width: auto;
      min-width: 150px;
      color: var(--ink);
      background: #070909;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 5px 7px;
      font: inherit;
      font-size: 12px
    }

    .set-grid input[type=number] {
      min-width: 0;
      width: 80px
    }

    .set-grid input[type=checkbox] {
      width: auto;
      margin: 0
    }

    .guide-overview {
      min-height: 100%;
      display: grid;
      place-items: start center;
      padding: 34px 30px
    }

    .guide-overview .go-card {
      width: min(680px, 100%);
      border: 1px solid var(--line);
      background: #0b0e0f;
      border-radius: 12px;
      padding: 18px 20px
    }

    .guide-overview h1 {
      margin: 0 0 4px;
      font-size: 18px;
      color: var(--ink)
    }

    .guide-overview .go-sub {
      color: var(--ghost);
      font-size: 11px;
      margin-bottom: 14px
    }

    .guide-overview .go-overview {
      color: var(--muted);
      line-height: 1.55;
      margin: 0 0 12px;
      font-size: 13px
    }

    .guide-overview .go-pr {
      border: 1px solid var(--line);
      background: #070909;
      border-radius: 8px;
      padding: 9px 12px;
      margin: 0 0 12px
    }

    .guide-overview .go-pr b {
      color: var(--ink);
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 4px
    }

    .guide-overview .go-pr p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5
    }

    .guide-overview .go-plan {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 2px 0 16px
    }

    .guide-overview .go-cat {
      flex: 1 1 0;
      min-width: 96px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 6px 9px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #0b0e0f;
      cursor: pointer;
      text-align: left
    }

    .guide-overview .go-cat:hover {
      border-color: #354146;
      background: #0e1517
    }

    .guide-overview .go-cat-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 6px
    }

    .guide-overview .go-cat-lab {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap
    }

    .guide-overview .go-cat.crit .go-cat-lab {
      color: var(--amber)
    }

    .guide-overview .go-cat.done .go-cat-lab {
      color: var(--green)
    }

    .guide-overview .go-cat-cnt {
      font-size: 10px;
      color: var(--ghost)
    }

    .guide-overview .go-cat-bar {
      height: 4px;
      border-radius: 3px;
      background: var(--line);
      overflow: hidden
    }

    .guide-overview .go-cat-bar>i {
      display: block;
      height: 100%;
      background: var(--green);
      transition: width .25s
    }

    .guide-overview .go-actions {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .guide-overview .go-meta {
      color: var(--ghost);
      font-size: 12px
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 46px;
      transform: translateX(-50%);
      border: 1px solid #163b2b;
      background: #071811;
      color: var(--green);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      display: none
    }

    .toast.show {
      display: block
    }

    @media(max-width:1100px) {
      body {
        overflow: auto
      }

      .app {
        height: auto;
        min-height: 100%
      }

      .main {
        grid-template-columns: 1fr
      }

      .resizer {
        display: none
      }

      .tree,
      .right {
        border: 0;
        border-bottom: 1px solid var(--line)
      }

      .action-pop,
      .composer {
        position: static;
        width: auto;
        margin: 12px
      }
    }

    body.single .tree,
    body.single .resizer[data-resize="left"] {
      display: none
    }

    body.single .main {
      grid-template-columns: minmax(0, 1fr)
    }

    body.file-mode .tree,
    body.file-mode .right,
    body.file-mode .resizer {
      display: none
    }

    body.file-mode .main {
      grid-template-columns: minmax(0, 1fr)
    }
  </style>
</head>

<body>
  <div class="app" x-data>
    <header class="top">
      <div><span class="brand">Galley</span></div>
      <div class="toggles">
        <div class="toggle" x-show="!($store.g.isMarkdownFile() && $store.g.fileView==='rendered')"><button
            :class="{active: $store.g.diffStyle==='split'}" @click="$store.g.setStyle('split')">Split</button><button
            :class="{active: $store.g.diffStyle==='unified'}" @click="$store.g.setStyle('unified')">Stacked</button>
        </div>
        <div class="toggle" x-show="$store.g.isMarkdownFile()"><button :class="{active: $store.g.fileView==='rendered'}"
            @click="$store.g.setFileView('rendered')">Rendered</button><button
            :class="{active: $store.g.fileView==='source'}" @click="$store.g.setFileView('source')">Source</button>
        </div>
      </div>
      <div class="actions"><button class="btn icon" title="Settings" @click="$store.g.openSettings()">⚙</button><button
          class="btn" @click="$store.g.reset()">Reset Review</button><button class="btn primary"
          :disabled="$store.g.awaitingAgent" @click="$store.g.send()"
          x-text="$store.g.awaitingAgent ? 'Waiting for Agent…' : 'Send to Agent'">Send to Agent</button></div>
    </header>
    <main class="main">
      <aside class="tree">
        <div id="files"><template x-for="r in $store.g.treeRows()" :key="r.key">
            <div class="node" :class="r.cls" @click="$store.g.rowClick(r)"><span x-show="r.kind==='dir'"
                x-text="r.dirCaret"></span><span x-text="r.name"></span><span class="count"
                x-show="r.kind==='dir' && r.count" x-text="r.count"></span><span x-show="r.testToggle"
                x-text="r.testCaret" @click.stop="$store.g.toggleTestDir(r.testKey)"></span><span class="status-pack"
                x-show="r.badges"><span class="state-icon pending-decisions"
                  x-show="r.badges && r.badges.pending">◇</span><span class="state-icon comments-open"
                  x-show="r.badges && r.badges.comments">⋯</span><span class="state-icon viewed"
                  x-show="r.badges && r.badges.viewed">✓</span></span><button class="git-action" x-show="r.git"
                :class="r.git" @click.stop="$store.g.gitToggle(r.path, r.git)" x-text="r.gitSymbol"></button></div>
          </template></div>
      </aside>
      <div class="resizer" data-resize="left"></div>
      <section class="center">
        <div class="guidebar" x-show="$store.g.showGuideBar && $store.g.showGuideBar()" x-cloak>
          <div class="gb-acts">
            <button class="gb-home" @click="$store.g.openOverview()" title="Overview">⌂</button>
            <button class="gb-nav" @click="$store.g.guidePrev()"
              :disabled="$store.g.guideAtStart && $store.g.guideAtStart()" title="Previous (k)">←</button>
            <button class="gb-nav" @click="$store.g.guideNext()"
              :disabled="$store.g.guideAtLast && $store.g.guideAtLast()" title="Next (j)">→</button>
          </div>
          <span class="gb-stale" x-show="$store.g.guideStale && $store.g.guideStale()"
            title="Guide generated for an earlier diff — regenerate and restart with --guide to refresh">⚠ Guide Stale</span>
          <span class="gb-fill"></span>
          <span class="gb-progress" x-show="$store.g.guideProgress">
            <span class="gb-bar"><i :style="`width:${$store.g.guideProgress().pct}%`"></i></span>
            <span x-text="$store.g.guideProgress().done + '/' + $store.g.guideProgress().total + ' reviewed'"></span>
          </span>
        </div>
        <div id="diff" x-ignore></div>
      </section>
      <div class="action-pop" id="actionPop" :class="{show: $store.g.popoverOpen}">
        <div class="pop-context" id="popContext">New line</div><button class="choice"
          @click="$store.g.openComposer()"><span>c</span>
          <div><b>Comment</b><small>Add note on selection</small></div>
        </button>
      </div>
      <div class="composer" id="composer" :class="{show: $store.g.composerOpen}">
        <div class="composer-head"><span x-text="$store.g.composerTitle">New line</span></div><textarea id="commentBody"
          x-model="$store.g.composerBody"></textarea>
        <div class="composer-actions"><button class="btn" x-show="!$store.g.editingCommentId"
            @click="$store.g.ask()">Ask</button><button class="btn primary" x-show="!$store.g.editingCommentId"
            @click="$store.g.requestChange()">Request change</button><button class="btn primary"
            x-show="$store.g.editingCommentId" @click="$store.g.saveComment()">Save</button></div>
      </div>
      <div class="modal-backdrop" id="stageModal" :class="{show: $store.g.modalOpen}">
        <div class="modal">
          <h3>Pending decisions</h3>
          <p>Staging will keep all changes and resolve all comments in this file.</p>
          <div class="modal-actions"><button class="btn" @click="$store.g.cancelStage()">Cancel</button><button
              class="btn primary" @click="$store.g.confirmStage()">Keep all and stage</button></div>
        </div>
      </div>
      <div class="modal-backdrop" id="settingsModal" :class="{show: $store.g.settingsOpen}"
        @click.self="$store.g.closeSettings()">
        <div class="modal settings">
          <h3>Settings</h3>
          <div class="set-section">Diff</div>
          <div class="set-grid"><label>Layout<select :value="$store.g.diffStyle"
                @change="$store.g.setStyle($event.target.value)">
                <option value="split">Split</option>
                <option value="unified">Unified</option>
              </select></label><label>Intra-line<select x-model="$store.g.settings.lineDiffType"
                @change="$store.g.applySettings()">
                <option value="word-alt">Word</option>
                <option value="char">Character</option>
                <option value="none">None</option>
              </select></label><label>Change indicators<select x-model="$store.g.settings.diffIndicators"
                @change="$store.g.applySettings()">
                <option value="bars">Bars</option>
                <option value="classic">Classic</option>
                <option value="none">None</option>
              </select></label><label>Hunk separators<select x-model="$store.g.settings.hunkSeparators"
                @change="$store.g.applySettings()">
                <option value="line-info">Line info</option>
                <option value="simple">Simple</option>
                <option value="metadata">Metadata</option>
              </select></label><label>Line wrapping<select x-model="$store.g.settings.overflow"
                @change="$store.g.applySettings()">
                <option value="scroll">Scroll</option>
                <option value="wrap">Wrap</option>
              </select></label><label>Line highlight<select x-model="$store.g.settings.lineHighlight"
                @change="$store.g.applySettings()">
                <option value="full">Full</option>
                <option value="subtle">Subtle</option>
                <option value="off">Off (word only)</option>
              </select></label></div>
          <div class="set-section">Appearance</div>
          <div class="set-grid"><label>Code theme<select x-model="$store.g.settings.theme"
                @change="$store.g.applySettings()">
                <optgroup label="Diff + comments">
                  <option value="material-theme-palenight">Palenight</option>
                  <option value="material-theme-darker">Material Darker</option>
                  <option value="github-dark">GitHub Dark</option>
                  <option value="dracula">Dracula</option>
                  <option value="ayu-dark">Ayu Dark</option>
                  <option value="gruvbox-dark-medium">Gruvbox</option>
                  <option value="everforest-dark">Everforest</option>
                  <option value="dark-plus">Dark+ (VS Code)</option>
                </optgroup>
                <optgroup label="Diff only">
                  <option value="pierre-dark">Pierre Dark</option>
                  <option value="pierre-dark-soft">Pierre Dark Soft</option>
                </optgroup>
              </select></label><label>Font<select x-model="$store.g.settings.font" @change="$store.g.applySettings()">
                <option value="jetbrains-mono">JetBrains Mono</option>
                <option value="geist-mono">Geist Mono</option>
                <option value="fira-code">Fira Code</option>
                <option value="ibm-plex-mono">IBM Plex Mono</option>
                <option value="source-code-pro">Source Code Pro</option>
                <option value="roboto-mono">Roboto Mono</option>
              </select></label><label>Font size<input type="number" min="11" max="16" step="0.5"
                x-model.number="$store.g.settings.fontSize" @change="$store.g.applySettings()"></label></div>
          <div class="set-section">File tree</div>
          <div class="set-grid"><label class="check"><input type="checkbox" x-model="$store.g.settings.showUnchanged"
                @change="$store.g.applySettings()">Show unchanged files</label></div>
          <div class="set-section">Behavior</div>
          <div class="set-grid"><label class="check"><input type="checkbox" x-model="$store.g.settings.stageOnAccept"
                @change="$store.g.applySettings()">Stage on accept (off = verdict only)</label></div>
          <div class="modal-actions"><button class="btn primary" @click="$store.g.closeSettings()">Done</button></div>
        </div>
      </div>
      <div class="toast" id="toast" :class="{show: $store.g.toastMsg}" x-text="$store.g.toastMsg">saved</div>
    </main>
  </div>
  <script type="module" src="/ui.js"></script>
</body>

</html>
